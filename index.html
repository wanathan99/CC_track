<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Credit Card Sign-Up Bonuses</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .filters select, .filters input {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      background: white;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 1100px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: #1a1a2e;
      color: white;
    }

    th {
      padding: 0.85rem 1rem;
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    th:hover { background: #2e2e4e; }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #eee;
      font-size: 0.92rem;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4ff; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge-travel    { background: #dbeafe; color: #1d4ed8; }
    .badge-cashback  { background: #dcfce7; color: #15803d; }
    .badge-dining    { background: #fef9c3; color: #854d0e; }
    .badge-other     { background: #f3e8ff; color: #6b21a8; }

    .source-link {
      color: #2563eb;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .source-link:hover { text-decoration: underline; }

    .no-results {
      text-align: center;
      padding: 2rem;
      color: #888;
    }

    .sort-arrow { font-size: 0.7rem; margin-left: 4px; }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>

  <h1>Best Credit Card Sign-Up Bonuses</h1>
  <p class="subtitle">Sorted by estimated bonus value. Click a source link to verify current offers.</p>

  <div class="filters">
    <input type="text" id="search" placeholder="Search cards..." />
    <select id="category-filter">
      <option value="">All Categories</option>
      <option value="Travel">Travel</option>
      <option value="Cash Back">Cash Back</option>
      <option value="Dining">Dining</option>
    </select>
    <select id="fee-filter">
      <option value="">Any Annual Fee</option>
      <option value="no-fee">No Annual Fee</option>
      <option value="has-fee">Has Annual Fee</option>
    </select>
  </div>

  <div class="table-wrapper">
    <table id="cards-table">
      <thead>
        <tr>
          <th data-col="name">Card <span class="sort-arrow"></span></th>
          <th data-col="bonus">Bonus <span class="sort-arrow"></span></th>
          <th data-col="bonus_value">Est. Value <span class="sort-arrow"></span></th>
          <th data-col="spend_requirement">Spend Req. <span class="sort-arrow"></span></th>
          <th data-col="annual_fee">Annual Fee <span class="sort-arrow"></span></th>
          <th data-col="category">Category <span class="sort-arrow"></span></th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" class="no-results">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    Data maintained manually. Always verify offers directly with the issuer before applying.
  </footer>

  <script>
    let allCards = [];
    let sortCol = 'bonus_value';
    let sortDir = 1;

    function parseDollar(str) {
      return parseFloat((str || '').replace(/[^0-9.]/g, '')) || 0;
    }

    function categoryBadge(cat) {
      const lower = cat.toLowerCase();
      let cls = 'other';
      if (lower.includes('travel')) cls = 'travel';
      else if (lower.includes('cash')) cls = 'cashback';
      else if (lower.includes('dining')) cls = 'dining';
      return `<span class="badge badge-${cls}">${cat}</span>`;
    }

    function render(cards) {
      const tbody = document.getElementById('table-body');
      if (!cards.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-results">No cards match your filters.</td></tr>';
        return;
      }
      tbody.innerHTML = cards.map(c => `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.bonus}</td>
          <td>${c.bonus_value}</td>
          <td>${c.spend_requirement}</td>
          <td>${c.annual_fee}</td>
          <td>${categoryBadge(c.category)}</td>
          <td><a class="source-link" href="${c.source_url}" target="_blank" rel="noopener">${c.source_name} &rarr;</a></td>
        </tr>
      `).join('');
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const cat = document.getElementById('category-filter').value;
      const fee = document.getElementById('fee-filter').value;

      let filtered = allCards.filter(c => {
        const matchSearch = !search || c.name.toLowerCase().includes(search) || c.category.toLowerCase().includes(search);
        const matchCat = !cat || c.category.includes(cat);
        const matchFee = !fee
          || (fee === 'no-fee' && c.annual_fee === '$0')
          || (fee === 'has-fee' && c.annual_fee !== '$0');
        return matchSearch && matchCat && matchFee;
      });

      filtered.sort((a, b) => {
        let av = a[sortCol] || '', bv = b[sortCol] || '';
        if (['bonus_value', 'annual_fee'].includes(sortCol)) {
          av = parseDollar(av); bv = parseDollar(bv);
        }
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });

      render(filtered);
      updateArrows();
    }

    function updateArrows() {
      document.querySelectorAll('th[data-col] .sort-arrow').forEach(el => el.textContent = '');
      const active = document.querySelector(`th[data-col="${sortCol}"] .sort-arrow`);
      if (active) active.textContent = sortDir === 1 ? ' ▲' : ' ▼';
    }

    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = 1; }
        applyFilters();
      });
    });

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('category-filter').addEventListener('change', applyFilters);
    document.getElementById('fee-filter').addEventListener('change', applyFilters);

    fetch('data/cards.json')
      .then(r => r.json())
      .then(data => {
        allCards = data;
        applyFilters();
      })
      .catch(() => {
        document.getElementById('table-body').innerHTML =
          '<tr><td colspan="7" class="no-results">Failed to load card data.</td></tr>';
      });
  </script>

</body>
</html>
